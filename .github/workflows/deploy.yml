name: Build & Deploy

on:
  push:
    branches: [musiclab]
  pull_request:
    branches: [musiclab]
  workflow_dispatch:

jobs:
  # ─── 构建 ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建静态文件
        run: npm run build
        env:
          BASE_PATH: /indie-launch-kit

      # 上传构建产物（可在 GitHub Actions 页面 > 该次运行 > Artifacts 处下载）
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7 # 保留 7 天，之后自动删除

  # ─── 部署到腾讯云 COS（国内推荐） ────────────────────────────────────────────
  # 触发条件：push 到 main 分支（PR 不触发部署）
  # 需要在仓库 Settings > Secrets and variables > Actions 中添加：
  #   COS_SECRET_ID   腾讯云 API 密钥 ID
  #   COS_SECRET_KEY  腾讯云 API 密钥 Key
  #   COS_BUCKET      存储桶名称（如 my-app-1234567890）
  #
  # 使用方法：取消整个 deploy-cos job 的注释即可

  # deploy-cos:
  #   name: Deploy to COS
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #   steps:
  #     - name: 下载构建产物
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: dist
  #         path: dist/
  #
  #     - name: 部署到腾讯云 COS
  #       uses: TencentCloud/cos-action@v1
  #       with:
  #         secret_id: ${{ secrets.COS_SECRET_ID }}
  #         secret_key: ${{ secrets.COS_SECRET_KEY }}
  #         bucket: ${{ secrets.COS_BUCKET }}
  #         region: ap-guangzhou   # 改为你的存储桶地区
  #         local_path: dist/
  #         remote_path: /
  #         clean: true            # 部署前清理旧文件，保持目录干净

  # ─── 部署到 Cloudflare Pages（海外推荐） ─────────────────────────────────────
  # 需要在仓库 Settings > Secrets 中添加：
  #   CF_API_TOKEN   Cloudflare API Token
  #   CF_ACCOUNT_ID  Cloudflare 账户 ID
  #
  # 使用方法：取消整个 deploy-cloudflare job 的注释即可

  # deploy-cloudflare:
  #   name: Deploy to Cloudflare Pages
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #   steps:
  #     - name: 下载构建产物
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: dist
  #         path: dist/
  #
  #     - name: 部署到 Cloudflare Pages
  #       uses: cloudflare/pages-action@v1
  #       with:
  #         apiToken: ${{ secrets.CF_API_TOKEN }}
  #         accountId: ${{ secrets.CF_ACCOUNT_ID }}
  #         projectName: my-app-landing   # 改为你在 Cloudflare Pages 的项目名
  #         directory: dist/
  #         gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ─── 部署到 GitHub Pages（最简单） ───────────────────────────────────────────
  # 无需额外 Secrets，但需要在仓库 Settings > Pages 中：
  #   Source 选择 "GitHub Actions"
  #
  # 使用方法：取消整个 deploy-github-pages job 的注释即可

  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/musiclab'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 上传到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
