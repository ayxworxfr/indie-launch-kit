# ============================================================
# indie-launch-kit 配置文件 —— 乐理通 (MusicLab)
# 修改这个文件，然后 git push，你的推广页就自动更新了
# ============================================================

app:
  name: '乐理通' # App 名称（显示在页面标题、Header、Footer）
  tagline:
    zh: '从零开始，轻松学音乐'
    en: 'Start from Zero, Learn Music Easily'
  description:
    zh: '乐理通是一款专为音乐爱好者设计的学习 App，涵盖简谱/五线谱/钢琴入门课程、四种练习模式、虚拟钢琴与专业乐谱编辑器'
    en: 'MusicLab is a music learning app for enthusiasts, featuring jianpu/staff notation/piano courses, four practice modes, a virtual piano, and a professional sheet music editor'
  icon: '/images/icon.png'
  logo: '/images/logo.png'

# 主题色
theme:
  primary: '#7C3AED'   # 紫色，与音乐气质契合
  secondary: '#EC4899' # 粉色，活泼生动

# 下载链接：不需要的平台留空字符串 "" 即可，对应按钮会自动隐藏
download:
  web_url: '' # Web 版体验地址（可选，如 https://app.example.com，留空则不显示）
  ios_url: ''     # 上架 App Store 后填写
  android_url: '' # 上架 Google Play 后填写
  apk_url: ''     # 直链 APK 地址（可选）
  qrcode: ''      # 扫码下载图路径（可选）

# 功能亮点
features:
  - icon: '🎓'
    title:
      zh: '系统化课程体系'
      en: 'Structured Course System'
    description:
      zh: '简谱入门 → 五线谱入门 → 钢琴入门，三大课程循序渐进，每个阶段目标清晰'
      en: 'Jianpu → Staff Notation → Piano: three progressive courses with clear milestones at every stage'

  - icon: '🎯'
    title:
      zh: '四种趣味练习模式'
      en: 'Four Practice Modes'
    description:
      zh: '识谱、节奏、听音、弹奏四种模式全面训练，让枯燥练习变成有趣游戏'
      en: 'Note reading, rhythm, ear training, and piano playing — turn boring drills into engaging games'

  - icon: '🎹'
    title:
      zh: '虚拟钢琴 & 节拍器'
      en: 'Virtual Piano & Metronome'
    description:
      zh: '88键全音域多点触控钢琴，支持录制回放；专业节拍器 BPM 20-240 可调，多种拍号支持'
      en: 'Full 88-key multi-touch piano with recording; professional metronome from BPM 20-240 with various time signatures'

  - icon: '📝'
    title:
      zh: '乐谱创作与导出'
      en: 'Sheet Music Editor & Export'
    description:
      zh: '创建、编辑、播放乐谱，支持和弦与多音轨，一键导出 PDF / MIDI 文件'
      en: 'Create, edit, and play sheet music with chords and multi-track support; export to PDF or MIDI in one tap'

# 应用截图
screenshots:
  - src: '/images/screenshot-1.png'
    alt:
      zh: '首页截图'
      en: 'Home screen'
  - src: '/images/screenshot-2.png'
    alt:
      zh: '课程界面截图'
      en: 'Course screen'
  - src: '/images/screenshot-3.png'
    alt:
      zh: '虚拟钢琴截图'
      en: 'Virtual piano screen'
  - src: '/images/screenshot-4.png'
    alt:
      zh: '练习界面截图'
      en: 'Practice screen'

# 顶部公告横幅
announcement:
  enabled: false
  content:
    zh: '🎉 乐理通正式上线！现在下载，开启你的音乐之旅'
    en: '🎉 MusicLab is now live! Download now and start your music journey'

# 站点域名
site_url: 'https://ayxworxfr.github.io/indie-launch-kit'

# SEO 与社交分享
seo:
  og_image: '/images/og-image.png'
  twitter_handle: ''

# 页脚信息
footer:
  copyright: '乐理通'
  contact_email: ''
  links: []

# 默认语言
default_locale: 'zh'
